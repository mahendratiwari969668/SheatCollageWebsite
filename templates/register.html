<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SHEAT</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI, sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #f8fbff);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .card {
      background: white;
      width: 100%;
      max-width: 500px;
      padding: 35px;
      border-radius: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 10px;
    }

    p.subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 25px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 14px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
    }

    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.08);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s ease;
    }

    button:hover {
      background: #1d4ed8;
    }

    .message {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 600;
    }

    .link-box {
      text-align: center;
      margin-top: 18px;
      color: #475569;
    }

    .link-box a {
      color: #2563eb;
      font-weight: 700;
      text-decoration: none;
    }
    /* ================= GLOBAL PAGE LOADER ================= */
    #page-loader {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      background: rgba(15, 23, 42, 0.96);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #page-loader.hide {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .loader-text {
      color: #e0f2fe;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .neon-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100px;
      height: 100px;
    }

    .neon-loader-ring {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #0ff;
      animation: neon-spin 1s linear infinite;
    }

    .neon-loader-ring::before {
      content: '';
      position: absolute;
      top: -4px;
      left: -4px;
      right: -4px;
      bottom: -4px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-top: 4px solid #0ff;
      filter: blur(5px);
      opacity: 0.7;
      animation: neon-glow 1.5s ease-in-out infinite;
    }

    @keyframes neon-spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes neon-glow {
      0%, 100% {
        filter: blur(5px);
        opacity: 0.7;
      }
      50% {
        filter: blur(10px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
    <!-- ================= GLOBAL LOADER ================= -->
  <div id="page-loader">
    <div class="loader-wrapper">
      <div class="neon-loader">
        <div class="neon-loader-ring"></div>
      </div>
      <div class="loader-text">Loading SHEAT Portal...</div>
    </div>
  </div>

  <div class="card">
    <h1>Create Account</h1>
    <p class="subtitle">Register once and login anytime</p>

    {% if message %}
      <div class="message">{{ message }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('register') }}">
      <div class="form-group">
        <input type="text" name="name" placeholder="Full Name" required>
      </div>

      <div class="form-group">
        <input type="email" name="email" placeholder="Email Address" required>
      </div>

      <div class="form-group">
        <input type="password" name="password" placeholder="Password" required>
      </div>

      <div class="form-group">
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>
      </div>

      <button type="submit">Register</button>
    </form>

    <div class="link-box">
      Already have an account?
      <a href="{{ url_for('login') }}">Login here</a>
    </div>
  </div>

  <script>
    // Hide loader when page fully loads
    window.addEventListener("load", function () {
      const loader = document.getElementById("page-loader");
      if (loader) {
        setTimeout(() => {
          loader.classList.add("hide");
        }, 500);
      }
    });

    // Show loader when navigating through links
    document.addEventListener("DOMContentLoaded", function () {
      const loader = document.getElementById("page-loader");
      const links = document.querySelectorAll("a[href]");

      links.forEach(link => {
        link.addEventListener("click", function (e) {
          const href = link.getAttribute("href");

          // Ignore anchors, JS links, empty links, and new tabs
          if (
            !href ||
            href.startsWith("#") ||
            href.startsWith("javascript:") ||
            link.target === "_blank"
          ) {
            return;
          }

          if (loader) {
            loader.classList.remove("hide");
          }
        });
      });
    });
  </script>

</body>
</html>
